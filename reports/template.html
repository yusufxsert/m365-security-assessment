<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M365 Security Assessment Report</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a2e; color: #e0e0e0; }
        .header { background: #0078D4; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 2em; color: white; }
        .header p { margin: 5px 0 0; color: #c8e6ff; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .meta { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 25px; display: flex; gap: 30px; }
        .meta div { flex: 1; }
        .meta label { font-size: 0.8em; color: #8899aa; text-transform: uppercase; }
        .meta p { margin: 4px 0 0; font-size: 1.1em; font-weight: bold; }
        h2 { color: #0078D4; border-bottom: 1px solid #0078D4; padding-bottom: 8px; margin-top: 35px; }
        ul { list-style: none; padding: 0; }
        li { background: #16213e; border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; }
        .footer { text-align: center; padding: 30px; color: #556677; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>M365 Security Assessment Report</h1>
        <p>Powered by Microsoft Graph API — Read-Only Assessment</p>
    </div>
    <div class="container">
        <div class="meta">
            <div>
                <label>Report Datum</label>
                <p>{{REPORT_DATE}}</p>
            </div>
            <div>
                <label>Tenant ID</label>
                <p>{{TENANT_ID}}</p>
            </div>
            <div>
                <label>Erstellt von</label>
                <p>Yusuf Sert — M365 Assessment Tool</p>
            </div>
        </div>
        {{RESULTS}}
    </div>
    <div class="footer">
        <p>Generiert von M365 Security Assessment Framework &nbsp;·&nbsp; github.com/yusufxsert/m365-security-assessment</p>
    </div>
</body>
</html>
